    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header" data-site-header>
      <a class="brand" href="index.html">Mary Khoury</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation" data-nav-toggle>
        <span class="sr-only">Open navigation</span>

    <main id="main-content" class="gallery-page" data-gallery-page="illustration" data-gallery-title="Illustration">
      <section class="page-intro section-wrap narrow">
        <p class="eyebrow">Portfolio</p>
        <h1>Illustration</h1>
        <p>Add image files to <code>artwork/illustration</code>. The page will sort them by filename, so <code>1_</code> appears before <code>2_</code>.</p>
      </section>

      <section class="section-wrap">
        <div class="status-card" data-gallery-status>Loading artwork from the folder…</div>
        <div class="gallery-grid" data-gallery-grid aria-live="polite"></div>
      </section>
    </main>

    <dialog class="lightbox" data-lightbox aria-label="Artwork preview">
      <button class="lightbox-close" type="button" data-lightbox-close aria-label="Close preview">×</button>
      <div class="lightbox-inner">
        <img data-lightbox-image alt="" />
        <div class="lightbox-details">
          <p class="eyebrow" data-lightbox-category></p>
          <h2 data-lightbox-title></h2>
          <p data-lightbox-description></p>
          <p class="lightbox-meta" data-lightbox-meta></p>
        </div>
      </div>
    </dialog>

    <footer class="site-footer">
